<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Pong Game</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            margin: 0;\n            background-color: #000;\n            color: #fff;\n        }\n        canvas {\n            border: 1px solid #fff;\n        }\n    </style>\n</head>\n<body>\n    <canvas id=\"pongCanvas\" width=\"800\" height=\"400\"></canvas>\n    <script>\n        const canvas = document.getElementById('pongCanvas');\n        const context = canvas.getContext('2d');\n\n        // Create the paddle\n        const paddleWidth = 10, paddleHeight = 100;\n        let playerPaddle = {\n            x: 0,\n            y: canvas.height / 2 - paddleHeight / 2,\n            width: paddleWidth,\n            height: paddleHeight,\n            score: 0\n        };\n\n        let aiPaddle = {\n            x: canvas.width - paddleWidth,\n            y: canvas.height / 2 - paddleHeight / 2,\n            width: paddleWidth,\n            height: paddleHeight,\n            speed: 4\n        };\n\n        // Create the ball\n        const ball = {\n            x: canvas.width / 2,\n            y: canvas.height / 2,\n            size: 10,\n            speed: 4,\n            velocityX: 4,\n            velocityY: 4\n        };\n\n        // Draw everything\n        function draw() {\n            // Clear the canvas\n            context.clearRect(0, 0, canvas.width, canvas.height);\n            // Draw paddles\n            context.fillStyle = '#fff';\n            context.fillRect(playerPaddle.x, playerPaddle.y, playerPaddle.width, playerPaddle.height);\n            context.fillRect(aiPaddle.x, aiPaddle.y, aiPaddle.width, aiPaddle.height);\n            // Draw ball\n            context.beginPath();\n            context.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);\n            context.fill();\n        }\n\n        // Update game logic\n        function update() {\n            // Move the ball\n            ball.x += ball.velocityX;\n            ball.y += ball.velocityY;\n\n            // Ball collision with top and bottom walls\n            if (ball.y + ball.size > canvas.height || ball.y - ball.size < 0) {\n                ball.velocityY = -ball.velocityY;\n            }\n\n            // Ball collision with paddles\n            if (ball.x - ball.size < playerPaddle.x + playerPaddle.width &&\n                ball.y > playerPaddle.y && ball.y < playerPaddle.y + playerPaddle.height) {\n                ball.velocityX = -ball.velocityX;            } else if (ball.x + ball.size > aiPaddle.x &&\n                ball.y > aiPaddle.y && ball.y < aiPaddle.y + aiPaddle.height) {\n                ball.velocityX = -ball.velocityX;            }\n\n            // AI movement\n            if (ball.velocityX > 0 && ball.x > canvas.width / 2) {\n                aiPaddle.y += (ball.y - (aiPaddle.y + aiPaddle.height / 2)) * aiPaddle.speed / 100;\n            }\n\n            // Score update\n            if (ball.x - ball.size < 0) {\n                aiPaddle.score++;\n                resetBall();\n            } else if (ball.x + ball.size > canvas.width) {\n                playerPaddle.score++;\n                resetBall();\n            }\n        }\n\n        // Reset the ball position\n        function resetBall() {\n            ball.x = canvas.width / 2;\n            ball.y = canvas.height / 2;\n            ball.velocityX = -ball.velocityX;\n        }\n\n        // Control the paddle with mouse\n        canvas.addEventListener('mousemove', (event) => {\n            const rect = canvas.getBoundingClientRect();\n            playerPaddle.y = event.clientY - rect.top - playerPaddle.height / 2;\n        });\n\n        // Control the paddle with keyboard\n        document.addEventListener('keydown', (event) => {\n            switch (event.key) {\n                case 'ArrowUp':\n                    playerPaddle.y = Math.max(0, playerPaddle.y - 20);\n                    break;\n                case 'ArrowDown':\n                    playerPaddle.y = Math.min(canvas.height - playerPaddle.height, playerPaddle.y + 20);\n                    break;\n            }\n        });\n\n        // Main loop\n        function gameLoop() {\n            draw();\n            update();\n            requestAnimationFrame(gameLoop);\n        }\n\n        gameLoop();\n    <\/script>\n</body>\n</html>\n
